<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="fruits">Choose a fruit</label><br>
        <select name="" id="fruits" multiple>
            <option value="banana">Banana</option>
            <option value="apple">Apple</option>
            <option value="cherry" selected>Cherry</option>
            <option value="oranges">Oranges</option>
        </select>

        <br><br>

        <label for="language">Choose a language</label><br>
        <select name="" id="language" multiple size="2">
            <optgroup label="Backend">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="csharp">C#</option>
                <option value="php">PHP</option>
            </optgroup>
            <optgroup label="Frontend">
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
            </optgroup>
        </select>

        <br><br>

        <label for="framework">Choose a framework</label><br>
        <select name="" id="framework">
            <optgroup label="Backend">
                <option value="django">Django</option>
                <option value="laravel">Laravel</option>
                <option value="express">Express</option>
                <option value="spring">Spring</option>
            </optgroup>
            <optgroup label="Frontend">
                <option value="react">React</option>
                <option value="vue">Vue</option>
                <option value="angular">Angular</option>
                <option value="svelte">Svelte</option>
            </optgroup>
        </select>
    </form>
</body>
</html>
